name: Coletar eventos

on:
  schedule:
    - cron: "0 9 * * *"   # todo dia as 06:00 de Brasilia
  workflow_dispatch: {}     # e tambem sob demanda (botao Run workflow)

permissions:
  contents: write

concurrency:
  group: coletar
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Coletar eventos das fontes
        run: python scripts/coletar.py

      - name: Autoteste
        run: python scripts/autoteste.py

      - name: Publicar dados atualizados
        run: |
          git config user.name "robo-partiu"
          git config user.email "actions@github.com"
          git add docs/dados.js
          if git diff --cached --quiet; then
            echo "Nada mudou."
          else
            git commit -m "Atualiza eventos ($(date -u +%Y-%m-%d))"
            git push
          fi
